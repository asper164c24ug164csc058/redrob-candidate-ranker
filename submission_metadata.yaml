  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) for architecture discussion, scoring-logic design,
  and code review while building the ranking pipeline. No candidate data was
  sent to any hosted LLM as part of the ranking step itself — rank.py runs
  fully offline with no network calls.

methodology_summary: |
  Rule-based, fully explainable ranker. Five weighted scoring components
  (hard-skill match, nice-to-have match, experience-band fit, location fit,
  production-shipping signal) read from the full text of each profile, not
  just declared skills or job title. JD-specific disqualifier penalties
  (research-only background, recent-LangChain-only AI experience,
  architect/manager roles with no recent coding, consulting-only career,
  CV/speech/robotics without NLP, title-chasing pattern) are applied
  multiplicatively. A behavioral-availability multiplier from redrob_signals
  down-weights inactive/unresponsive candidates. A data-quality/honeypot
  penalty pushes internally-inconsistent profiles to the bottom. Runtime is
  ~23 seconds for 100,000 candidates on a standard CPU laptop, with 0
  honeypots reaching the final top 100.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
